<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 500" width="760" height="500" font-family="'IBM Plex Sans', system-ui, sans-serif" role="img" aria-label="Sample Strength Stack chart: snail teeth ranked first by specific strength, well above titanium, steel, nylon, bone, and concrete.">
  <title>Strength Stack sample chart</title>
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#4fd1ff" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="760" height="500" fill="#0a1628"/>
  <rect width="760" height="500" fill="url(#grid)"/>

  <!-- Wordmark -->
  <text x="32" y="48" font-family="'Space Grotesk', system-ui, sans-serif" font-weight="700" font-size="26" letter-spacing="-0.5">
    <tspan fill="#e8f0fb">Strength</tspan><tspan fill="#4fd1ff">Stack</tspan>
  </text>
  <text x="32" y="70" fill="#7d92b3" font-size="13">Real materials, one honest scale.</text>

  <!-- Chart panel -->
  <rect x="32" y="90" width="696" height="386" rx="8" fill="#0f1f3a" stroke="#4fd1ff" stroke-opacity="0.25"/>
  <text x="712" y="116" text-anchor="end" fill="#7d92b3" font-size="11" letter-spacing="0.5">SPECIFIC STRENGTH (kN·m/kg)</text>

  <!-- Rows: origin x=172 (label gutter), first bar top y=128, rowBand=54, barHeight=38 -->
  <g font-size="14">
    <!-- Snail Teeth — rank 1, celebrating (amber), value inside -->
    <rect x="172" y="128" width="451" height="38" rx="4" fill="#ffb454"/>
    <text x="160" y="151" text-anchor="end" fill="#ffb454" font-weight="500">Snail Teeth</text>
    <text x="615" y="151" text-anchor="end" fill="#0a1628" font-weight="600" font-size="13">1441</text>

    <!-- Titanium -->
    <rect x="172" y="182" width="67" height="38" rx="4" fill="#4fd1ff"/>
    <text x="160" y="205" text-anchor="end" fill="#e8f0fb">Titanium (Ti-6Al-4V)</text>
    <text x="247" y="205" fill="#7d92b3" font-weight="500" font-size="13">214</text>

    <!-- Steel -->
    <rect x="172" y="236" width="38" height="38" rx="4" fill="#4fd1ff"/>
    <text x="160" y="259" text-anchor="end" fill="#e8f0fb">Steel (hardened)</text>
    <text x="218" y="259" fill="#7d92b3" font-weight="500" font-size="13">121</text>

    <!-- Nylon -->
    <rect x="172" y="290" width="22" height="38" rx="4" fill="#4fd1ff"/>
    <text x="160" y="313" text-anchor="end" fill="#e8f0fb">Nylon</text>
    <text x="202" y="313" fill="#7d92b3" font-weight="500" font-size="13">70</text>

    <!-- Bone -->
    <rect x="172" y="344" width="21" height="38" rx="4" fill="#4fd1ff"/>
    <text x="160" y="367" text-anchor="end" fill="#e8f0fb">Bone</text>
    <text x="201" y="367" fill="#7d92b3" font-weight="500" font-size="13">68</text>

    <!-- Concrete (near zero) -->
    <rect x="172" y="398" width="2" height="38" rx="1" fill="#4fd1ff"/>
    <text x="160" y="421" text-anchor="end" fill="#e8f0fb">Concrete</text>
    <text x="182" y="421" fill="#7d92b3" font-weight="500" font-size="13">2</text>
  </g>
</svg>
